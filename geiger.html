<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111111">
<title>Geiger — Maplab</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #111; }
body { display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

#wrap { width: 100%; max-width: 360px; min-height: 100vh; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; gap: 2rem; }

#dist-display { font-size: 4rem; font-weight: 400; color: #fff; letter-spacing: -0.02em; line-height: 1; text-align: center; }
#dist-unit { font-size: 1rem; color: #666; margin-top: 0.35rem; text-align: center; letter-spacing: 0.05em; text-transform: uppercase; font-size: 0.75rem; }

#arrow-wrap { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
#ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid #222; }
#ring2 { position: absolute; inset: 16px; border-radius: 50%; border: 1px solid #1a1a1a; }
#arrow-svg { width: 140px; height: 140px; }

#status { font-size: 0.78rem; color: #555; text-align: center; line-height: 1.6; min-height: 2.5rem; padding: 0 1rem; }

#controls { width: 100%; display: flex; flex-direction: column; gap: 1rem; }

.ctrl-row { display: flex; align-items: center; gap: 0.75rem; }
.ctrl-label { font-size: 0.72rem; color: #555; min-width: 80px; text-transform: uppercase; letter-spacing: 0.05em; }
.ctrl-val { font-size: 0.72rem; color: #777; min-width: 40px; text-align: right; font-family: 'SF Mono', 'Fira Code', monospace; }
input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 2px; background: #333; border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px;
  border-radius: 50%; background: #4285F4; cursor: pointer;
}
input[type=range]:disabled { opacity: 0.3; }

#demo-note { font-size: 0.68rem; color: #444; text-align: center; line-height: 1.5; }

#compass-btn {
  width: 100%; padding: 0.75rem; background: #1a1a2e; border: 1px solid #2a2a5a;
  border-radius: 10px; color: #7ab3f0; font-size: 0.82rem; cursor: pointer;
  font-family: inherit; letter-spacing: 0.02em; transition: background 0.2s;
}
#compass-btn:hover { background: #1e2040; }
#compass-btn.active { background: #0d2a1a; border-color: #1a5a2a; color: #4ade80; }

#arrived-wrap {
  display: none; flex-direction: column; align-items: center; gap: 0.75rem;
}
#arrived-wrap.show { display: flex; }
#arrived-icon { width: 80px; height: 80px; }
#arrived-label { color: #4ade80; font-size: 1.1rem; letter-spacing: 0.05em; }

.divider { width: 100%; height: 1px; background: #1e1e1e; }
</style>
</head>
<body>
<div id="wrap">

  <div>
    <div id="dist-display">247</div>
    <div id="dist-unit">feet away</div>
  </div>

  <div id="arrow-wrap">
    <div id="ring"></div>
    <div id="ring2"></div>
    <svg id="arrow-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <polygon id="arrow-shape" points="70,18 92,92 70,78 48,92" fill="#4285F4"/>
      <circle cx="70" cy="70" r="5" fill="#ffffff" opacity="0.2"/>
    </svg>
    <div id="arrived-wrap" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;">
      <svg id="arrived-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <circle cx="40" cy="40" r="38" fill="#0d2a1a" stroke="#1a5a2a" stroke-width="1"/>
        <polyline points="20,40 32,52 60,24" fill="none" stroke="#4ade80" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div id="arrived-label">You're there</div>
    </div>
  </div>

  <div id="status">Slide to simulate · Real compass: tap button below</div>

  <div class="divider"></div>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Your heading</span>
      <input type="range" id="heading-sl" min="0" max="359" value="0" step="1">
      <span class="ctrl-val" id="heading-val">0°</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Dest bearing</span>
      <input type="range" id="bearing-sl" min="0" max="359" value="45" step="1">
      <span class="ctrl-val" id="bearing-val">45°</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Distance</span>
      <input type="range" id="dist-sl" min="0" max="500" value="247" step="1">
      <span class="ctrl-val" id="dist-val">247ft</span>
    </div>
    <div id="demo-note">On phone with real compass, heading is automatic.<br>Only distance and bearing would be set by the app.</div>
    <button id="compass-btn" onclick="tryRealCompass()">Enable real compass</button>
  </div>

</div>

<script>
let usingRealCompass = false;
let realHeading = 0;
let smoothAngle = 45;
let prevAngle = 45;
let animFrame;

function getColor(d) {
  if (d < 30) return '#4ade80';
  if (d < 120) return '#facc15';
  return '#4285F4';
}

function render() {
  const heading = usingRealCompass ? realHeading : parseInt(document.getElementById('heading-sl').value);
  const bearing = parseInt(document.getElementById('bearing-sl').value);
  const dist = parseInt(document.getElementById('dist-sl').value);

  const rawAngle = (bearing - heading + 360) % 360;

  // Shortest path interpolation — fixes the full-spin bug at 0/360 boundary
  let delta = rawAngle - prevAngle;
  if (delta > 180) delta -= 360;
  if (delta < -180) delta += 360;
  smoothAngle = prevAngle + delta * 0.25;
  prevAngle = smoothAngle;

  const color = getColor(dist);
  const arrived = dist < 15;

  document.getElementById('arrow-svg').style.transform = `rotate(${smoothAngle}deg)`;
  document.getElementById('arrow-shape').setAttribute('fill', color);
  document.getElementById('dist-display').textContent = dist;
  document.getElementById('dist-display').style.color = color;

  const arrivedEl = document.getElementById('arrived-wrap');
  const arrowSvg = document.getElementById('arrow-svg');
  if (arrived) {
    arrivedEl.style.display = 'flex';
    arrowSvg.style.opacity = '0';
    document.getElementById('dist-unit').textContent = 'destination reached';
    document.getElementById('dist-display').textContent = '0';
  } else {
    arrivedEl.style.display = 'none';
    arrowSvg.style.opacity = '1';
    document.getElementById('dist-unit').textContent = 'feet away';
  }

  document.getElementById('dist-val').textContent = dist + 'ft';
  document.getElementById('bearing-val').textContent = bearing + '°';
  if (!usingRealCompass) document.getElementById('heading-val').textContent = heading + '°';

  animFrame = requestAnimationFrame(render);
}

document.getElementById('heading-sl').addEventListener('input', () => {});
document.getElementById('bearing-sl').addEventListener('input', () => {});
document.getElementById('dist-sl').addEventListener('input', () => {});

function tryRealCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') startCompass();
      else document.getElementById('status').textContent = 'Permission denied — using sliders';
    }).catch(() => {
      document.getElementById('status').textContent = 'Could not get permission';
    });
  } else if (window.DeviceOrientationEvent) {
    startCompass();
  } else {
    document.getElementById('status').textContent = 'No compass sensor detected';
  }
}

function startCompass() {
  usingRealCompass = true;
  const btn = document.getElementById('compass-btn');
  btn.textContent = 'Compass active';
  btn.classList.add('active');
  document.getElementById('heading-sl').disabled = true;
  document.getElementById('status').textContent = 'Compass active — rotate phone, arrow follows';

  window.addEventListener('deviceorientationabsolute', e => {
    if (e.alpha !== null) realHeading = 360 - e.alpha;
  }, true);
  window.addEventListener('deviceorientation', e => {
    if (e.webkitCompassHeading !== undefined) realHeading = e.webkitCompassHeading;
    else if (e.alpha !== null) realHeading = 360 - e.alpha;
  }, true);
}

render();
</script>
</body>
</html>
